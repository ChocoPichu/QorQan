<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSpace | Operator Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-100 h-screen flex overflow-hidden" x-data="operatorDashboard()">

    <!-- ===== LOGIN OVERLAY ===== -->
    <div x-show="!isLoggedIn" class="fixed inset-0 bg-gray-100 z-50 flex items-center justify-center" x-cloak>
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Operator Login</h2>
            <form @submit.prevent="login">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                    <input x-model="loginData.username" type="text" class="w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                    <input x-model="loginData.password" type="password" class="w-full border rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>
                <div x-show="loginError" class="text-red-500 text-sm mb-4 text-center" x-text="loginError"></div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition-colors">
                    Login
                </button>
            </form>
        </div>
    </div>

    <!-- ===== MAIN DASHBOARD ===== -->
    <div x-show="isLoggedIn" class="w-full h-full flex" x-cloak>

        <!-- SIDEBAR -->
        <aside class="w-1/3 bg-white border-r border-gray-200 flex flex-col h-full">

            <!-- Sidebar header -->
            <div class="p-4 border-b border-gray-200 bg-blue-50 text-blue-800 flex justify-between items-center">
                <div>
                    <span class="font-bold text-lg">SafeSpace</span>
                    <span class="block text-xs text-blue-600" x-text="'Logged in as: ' + operatorName"></span>
                </div>
                <button @click="logout" class="text-xs bg-red-100 text-red-600 hover:bg-red-200 px-3 py-1 rounded-md transition-colors">Logout</button>
            </div>

            <!-- Tab bar -->
            <div class="flex border-b border-gray-200">
                <button @click="activeTab = 'tickets'"
                        class="flex-1 py-2 text-sm font-medium transition-colors"
                        :class="activeTab === 'tickets' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:text-gray-700'">
                    🎫 Tickets
                </button>
                <button @click="activeTab = 'blacklist'; fetchBlacklist()"
                        class="flex-1 py-2 text-sm font-medium transition-colors"
                        :class="activeTab === 'blacklist' ? 'text-red-600 border-b-2 border-red-600' : 'text-gray-500 hover:text-gray-700'">
                    🔨 Blacklist
                </button>
            </div>

            <!-- ── TICKETS TAB ── -->
            <div x-show="activeTab === 'tickets'" class="flex-1 overflow-y-auto p-4 space-y-3">
                <template x-for="ticket in tickets" :key="ticket.id">
                    <div @click="selectTicket(ticket)"
                         class="p-4 rounded-lg cursor-pointer border transition-colors shadow-sm"
                         :class="activeTicket?.id === ticket.id ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:bg-gray-50'">

                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-gray-800" x-text="ticket.full_name"></span>
                                <!-- Red dot badge -->
                                <span x-show="ticket.has_unread"
                                      class="inline-block w-2.5 h-2.5 rounded-full bg-red-500 unread-pulse"
                                      title="New message!"></span>
                            </div>
                            <span class="text-xs px-2 py-1 rounded-full text-white"
                                  :class="{ 'bg-red-500': ticket.urgency === 'danger', 'bg-green-500': ticket.urgency === 'safe', 'bg-yellow-500': ticket.urgency === 'notsure' }"
                                  x-text="ticket.urgency"></span>
                        </div>

                        <div class="flex justify-between text-sm text-gray-500">
                            <span x-text="'Status: ' + ticket.status"></span>
                            <span x-text="new Date(ticket.created_at).toLocaleTimeString()"></span>
                        </div>

                        <template x-if="ticket.status === 'waiting'">
                            <button @click.stop="acceptTicket(ticket.id)" class="mt-3 w-full bg-blue-600 hover:bg-blue-700 text-white py-1.5 rounded-md text-sm font-medium transition-colors">
                                Accept Chat
                            </button>
                        </template>
                    </div>
                </template>
                <div x-show="tickets.length === 0" class="text-center text-gray-500 mt-10">No active tickets.</div>
            </div>

            <!-- ── BLACKLIST TAB ── -->
            <div x-show="activeTab === 'blacklist'" class="flex-1 overflow-y-auto p-4 space-y-3">
                <div x-show="blacklist.length === 0" class="text-center text-gray-400 mt-10 text-sm">
                    🎉 No banned users. Keep it that way!
                </div>
                <template x-for="user in blacklist" :key="user.telegram_id">
                    <div class="p-3 rounded-lg border border-red-200 bg-red-50 shadow-sm">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-bold text-gray-800 text-sm" x-text="user.full_name"></p>
                                <p class="text-xs text-gray-500" x-text="user.username"></p>
                            </div>
                            <button @click="unbanUser(user.telegram_id)"
                                    class="text-xs bg-green-100 text-green-700 hover:bg-green-200 px-2 py-1 rounded transition-colors">
                                ✅ Unban
                            </button>
                        </div>
                        <p class="text-xs text-red-600 mt-1" x-text="'Reason: ' + user.reason"></p>
                        <p class="text-xs text-gray-400 mt-0.5" x-text="'Banned by: ' + user.banned_by + ' · ' + new Date(user.banned_at).toLocaleDateString()"></p>
                    </div>
                </template>
            </div>

        </aside>

        <!-- ===== CHAT PANEL ===== -->
        <main class="w-2/3 flex flex-col h-full bg-gray-50">
            <div x-show="!activeTicket" class="flex-1 flex items-center justify-center text-gray-400">
                <p>Select a ticket to view the chat.</p>
            </div>

            <template x-if="activeTicket">
                <div class="flex-1 flex flex-col h-full">
                    <!-- Chat header -->
                    <header class="p-4 bg-white border-b border-gray-200 flex justify-between items-center shadow-sm">
                        <div>
                            <h2 class="font-bold text-lg text-gray-800" x-text="'Chat with ' + activeTicket.full_name"></h2>
                            <p class="text-sm text-gray-500" x-text="activeTicket.username"></p>
                        </div>
                        <div class="flex gap-2">
                            <!-- 🔨 BAN HAMMER BUTTON — only visible when ticket is active -->
                            <template x-if="activeTicket.status === 'active'">
                                <button @click="openBanModal()"
                                        class="px-4 py-2 bg-orange-100 text-orange-700 hover:bg-orange-200 rounded-md font-medium text-sm transition-colors">
                                    🔨 Ban User
                                </button>
                            </template>
                            <button @click="closeTicket(activeTicket.id)" class="px-4 py-2 bg-red-100 text-red-700 hover:bg-red-200 rounded-md font-medium text-sm transition-colors">
                                Close Session
                            </button>
                        </div>
                    </header>

                    <!-- Messages -->
                    <div class="flex-1 overflow-y-auto p-4 space-y-4" id="chat-container">
                        <template x-for="msg in messages" :key="msg.id">
                            <div class="flex" :class="msg.sender_type === 'operator' ? 'justify-end' : 'justify-start'">
                                <div class="max-w-[70%] rounded-lg px-4 py-2" :class="msg.sender_type === 'operator' ? 'bg-blue-600 text-white rounded-br-none' : 'bg-gray-200 text-gray-800 rounded-bl-none'">
                                    <p x-text="msg.text" class="break-words"></p>
                                    <template x-if="msg.photo_id"><span class="text-xs italic opacity-75 mt-1 block">[Photo]</span></template>
                                    <span class="text-[10px] opacity-70 block mt-1 text-right" x-text="new Date(msg.timestamp).toLocaleTimeString()"></span>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Message input -->
                    <div class="p-4 bg-white border-t border-gray-200" x-show="activeTicket.status === 'active'">
                        <form @submit.prevent="sendMessage" class="flex gap-2">
                            <input type="text" x-model="newMessage" placeholder="Type a message..." class="flex-1 border border-gray-300 rounded-md px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500" autocomplete="off">
                            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-medium transition-colors" :disabled="!newMessage.trim()">Send</button>
                        </form>
                    </div>

                    <div class="p-4 bg-yellow-50 border-t border-yellow-200 text-center text-yellow-700 text-sm" x-show="activeTicket.status === 'waiting'">
                        You must accept this chat before you can send messages.
                    </div>
                </div>
            </template>
        </main>
    </div>

    <!-- ===== BAN MODAL ===== -->
    <div x-show="banModal.open"
         class="fixed inset-0 z-50 flex items-center justify-center bg-black/50"
         x-cloak>
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md mx-4">
            <h3 class="text-lg font-bold text-gray-800 mb-1">🔨 Ban User</h3>
            <p class="text-sm text-gray-500 mb-4" x-text="'You are about to ban: ' + (activeTicket?.full_name || '')"></p>
            <label class="block text-sm font-medium text-gray-700 mb-1">Reason (optional)</label>
            <textarea x-model="banModal.reason"
                      rows="3"
                      placeholder="e.g. Spam, harassment, trolling..."
                      class="w-full border border-gray-300 rounded-md px-3 py-2 outline-none focus:ring-2 focus:ring-orange-400 text-sm resize-none mb-4"></textarea>
            <div class="flex gap-3 justify-end">
                <button @click="banModal.open = false"
                        class="px-4 py-2 text-sm rounded-md border border-gray-300 hover:bg-gray-50 transition-colors">
                    Cancel
                </button>
                <button @click="confirmBan()"
                        class="px-4 py-2 text-sm bg-red-600 hover:bg-red-700 text-white rounded-md font-medium transition-colors">
                    🔨 Confirm Ban
                </button>
            </div>
        </div>
    </div>

    <style>
        [x-cloak] { display: none !important; }

        /* Pulsing red dot for unread messages */
        @keyframes unread-ping {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.6; }
        }
        .unread-pulse { animation: unread-ping 1.2s ease-in-out infinite; }

        /* Toast notification stack */
        #toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            background: #1e293b;
            color: #f1f5f9;
            padding: 0.75rem 1.25rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: toast-in 0.3s ease;
            max-width: 320px;
        }
        .toast.toast-warn { background: #b45309; }
        .toast.toast-info { background: #1d4ed8; }
        .toast.toast-success { background: #15803d; }
        .toast.toast-error { background: #991b1b; }
        @keyframes toast-in {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>

    <!-- Toast notification container -->
    <div id="toast-container"></div>

    <script src="/static/script.js"></script>
</body>
</html>
